# Negative case: a turn that LOOKS rule-like at a glance — the user is
# directing Codex to do something — but it's a one-off ask, not a standing
# instruction. ("Add a docstring HERE, this once" should NOT be elevated to
# "always add docstrings".) Tests that Haiku doesn't promote ephemeral asks.
description: "One-off task instruction (not a standing rule) must produce no captures"
prompt: stop_capture
input: |
  === Transcript of a conversation between a human and Codex ===
  [Human]
  Add a docstring to the parse_args function in cli/main.py — the one
  on line 42. One-liner is fine for now, just describe the return value.
  [Codex]
  Will do.
  [Tool output/error]
  Edit applied to src/cli/main.py at line 42.
  [Codex]
  Done — added a single-line docstring.
expect:
  - kind: no_line_matches
    value: "^[a-z][a-z0-9_]*(\\.[a-z0-9_]+){1,3}\\t.+$"
