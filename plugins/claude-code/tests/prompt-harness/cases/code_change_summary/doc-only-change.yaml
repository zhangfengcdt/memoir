# Positive case: doc-only Edit. Under the new WHY-focused prompt, haiku should
# frame this as "documenting" / "explaining" the behavior, not narrating the
# diff. NOT "trivial" — docs ARE substantive when they explain non-obvious
# pipelines like the Stop hook.
description: "Doc-only edit is framed as documenting behavior"
prompt: code_change_summary
input: |
  Edit docs/claude_code.md
  ## How auto-capture decides what to remember

  The Stop hook's capture stage makes one haiku call per turn that does both
  extraction and classification in one shot — emitting taxonomy-classified
  durable facts directly, bypassing memoir's internal LLM classifier chain.
  ---
expect:
  - kind: not_empty
  - kind: max_lines
    value: 1
  - kind: any_line_matches
    value: "(?i)\\b(document|docs|explain|describ|clarif|capture|auto-capture)\\w*\\b"
  - kind: any_line_matches
    value: "^(feature|bugfix|refactor|docs|chore) \| "
  - kind: no_line_matches
    value: "(?i)^trivial$"
