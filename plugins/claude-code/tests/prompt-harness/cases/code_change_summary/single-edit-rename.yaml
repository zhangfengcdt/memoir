# Positive case: a single Edit that renames a function. Under the new
# WHY-focused prompt, haiku should produce a reason-led summary (clarifying
# naming, intent, callers) rather than a pure diff narration.
description: "Single Edit renaming a function produces one why-focused line"
prompt: code_change_summary
input: |
  Edit src/auth.py
  def get_current_user(request):
      """Renamed from get_user — clearer intent for callers in the API layer."""
      return request.user
  ---
expect:
  - kind: not_empty
  - kind: max_lines
    value: 1
  - kind: any_line_matches
    value: "(?i)\\b(clarif|intent|naming|rename|caller|api)\\w*\\b"
  - kind: no_line_matches
    value: "(?i)^(here\\s+is|summary|the\\s+changes)"
  - kind: no_line_matches
    value: "^[\"']"
