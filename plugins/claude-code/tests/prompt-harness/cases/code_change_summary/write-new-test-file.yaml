# Positive case: Write creating a new test file. Under the new WHY-focused
# prompt, haiku should frame this as "adding regression coverage" / "capturing
# behavior" rather than "wrote a test file."
description: "Write of a new test file is framed as adding coverage"
prompt: code_change_summary
input: |
  Write tests/test_auth.py
  import pytest
  from src.auth import get_current_user

  def test_get_current_user_returns_request_user():
      class R: user = "alice"
      assert get_current_user(R) == "alice"

  def test_get_current_user_handles_none():
      class R: user = None
      assert get_current_user(R) is None
  ---
expect:
  - kind: not_empty
  - kind: max_lines
    value: 1
  - kind: any_line_matches
    value: "(?i)\\b(test|coverage|cover|regress|behaviou?r|baseline|verif)\\w*\\b"
  - kind: any_line_matches
    value: "^(feature|bugfix|refactor|docs|chore) \| "
