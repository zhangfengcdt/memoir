# Positive case: MultiEdit propagating a rename across multiple files. Under
# the new WHY-focused prompt, haiku should explain the motivation (propagating
# / updating callers / consistency) rather than narrating each substitution.
description: "MultiEdit refactor produces a grouped, why-focused summary"
prompt: code_change_summary
input: |
  MultiEdit src/api.py
  get_current_user
  ---
  MultiEdit src/api.py
  from auth import get_current_user
  ---
  MultiEdit tests/test_api.py
  get_current_user
  ---
expect:
  - kind: not_empty
  - kind: max_lines
    value: 1
  - kind: any_line_matches
    value: "(?i)\\b(propagat|consisten|caller|update|rename|migrate|clarif)\\w*\\b"
  - kind: any_line_matches
    value: "^(feature|bugfix|refactor|docs|chore) \| "
