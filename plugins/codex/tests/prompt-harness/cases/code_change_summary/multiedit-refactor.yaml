# Positive case: MultiEdit across multiple substitutions in one file. Should
# group by intent rather than listing every substitution.
description: "MultiEdit refactor produces a grouped summary"
prompt: code_change_summary
input: |
  MultiEdit src/api.py
  get_current_user
  ---
  MultiEdit src/api.py
  from auth import get_current_user
  ---
  MultiEdit tests/test_api.py
  get_current_user
  ---
expect:
  - kind: not_empty
  - kind: max_lines
    value: 1
  - kind: any_line_matches
    value: "(?i)\\b(refactor|rename|update|wired|migrate|propagat)\\w*\\b"
