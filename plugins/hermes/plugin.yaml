name: memoir
version: 0.1.0
# `standalone` (not auto-coerced to a memory-only plugin) so the general
# PluginManager can also load it — when listed in `plugins.enabled` — to
# register the in-session `/memoir` slash command. Memory-provider activation
# is independent (memory.provider: memoir); the directory scan finds it
# regardless of kind.
kind: standalone
description: "Memoir — versioned, semantic long-term memory with git-like branch/commit/merge and cryptographic provenance. Shells out to the memoir CLI; no Python deps."
author: "memoir"
# No pip_dependencies: this provider talks to the `memoir` CLI over a
# subprocess bridge (PATH `memoir`, else a pinned `uvx --from memoir-ai`).
# Install the CLI separately: `pip install memoir-ai` (or pipx / uv tool).
