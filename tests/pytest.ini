[pytest]
# Playwright configuration
addopts =
    --tb=short
    --strict-markers
    --disable-warnings
    --color=yes
markers =
    ui: UI tests
    slow: slow tests
    playwright: playwright tests

# Playwright specific settings
video_retention_on_failure = on
screenshot_on_failure = on

# litellm's internal async logging worker queues background coroutines bound
# to a pytest-asyncio event loop that gets torn down before the worker
# drains; on GC Python emits "coroutine 'Logging.async_success_handler' was
# never awaited". The race is upstream (litellm_core_utils/logging_worker.py)
# and unrelated to our tests.
filterwarnings =
    ignore:coroutine 'Logging.async_success_handler' was never awaited:RuntimeWarning
