version: '3.8'

# Development override for docker-compose.yml
# Usage: docker-compose -f docker-compose.yml -f docker-compose.dev.yml up -d

services:
  memoir-ui:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      # Mount source code for live development
      - ./src:/app/src:ro
      - ./examples:/app/examples:ro
      - ./tests:/app/tests:ro
      # Mount local data directory for development
      - ./docker-data:/app/data/memory_stores
    environment:
      - PYTHONPATH=/app
      - MEMOIR_DATA_DIR=/app/data/memory_stores
      - MEMOIR_DEBUG=1
    # Enable development features
    stdin_open: true
    tty: true
    # Restart policy for development
    restart: "no"
    # Override command for development (with auto-reload if needed)
    # command: python -m src.memoir.ui.serve_ui --reload
    
  # Remove the init service in development to avoid conflicts
  memoir-init:
    profiles:
      - donotstart