name: PyPI Smoke Test

# Run the clean-machine smoke test against a published memoir-ai version
# on PyPI. Manual trigger only — invoke after a release to verify the
# published wheel installs and runs end-to-end (CLI + UI server + key
# API endpoints) on a fresh box. No human eyeballing of the UI is
# required; assertions are fully automated.

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'memoir-ai version on PyPI to smoke-test (e.g. 0.1.4)'
        required: true
        type: string

jobs:
  smoke:
    name: Smoke-test memoir-ai==${{ inputs.version }}
    # Repo owner only. workflow_dispatch already requires Write access, but
    # this guard keeps the gate working if collaborators are added later —
    # other actors trigger a run that is immediately skipped, no secret use.
    if: github.actor == github.repository_owner
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Build smoke-test image
        run: |
          docker build \
            --build-arg "MEMOIR_VERSION=${{ inputs.version }}" \
            -t "memoir-pypi-smoke:${{ inputs.version }}" \
            scripts/pypi-smoke

      - name: Run smoke test (headless)
        env:
          # Empty string when the secret isn't configured — smoke.sh handles
          # that by skipping the LLM cases and keeping the rest green.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          mkdir -p /tmp/smoke-out
          docker run --rm \
            -e MEMOIR_SMOKE_HEADLESS=1 \
            -e MEMOIR_SMOKE_SUMMARY_FILE=/smoke-out/summary.md \
            -e ANTHROPIC_API_KEY \
            -v /tmp/smoke-out:/smoke-out \
            "memoir-pypi-smoke:${{ inputs.version }}"

      - name: Publish summary to job summary
        if: always()
        run: |
          if [[ -f /tmp/smoke-out/summary.md ]]; then
            cat /tmp/smoke-out/summary.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## ⚠️ PyPI Smoke Test — memoir-ai ${{ inputs.version }}" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Smoke script did not produce a summary file (likely failed before reaching the runner)." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload UI screenshots
        id: shots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-screenshots-${{ inputs.version }}
          path: /tmp/smoke-out/*.png
          if-no-files-found: ignore
          retention-days: 30

      - name: Append artifact link to summary
        if: always() && steps.shots.outputs.artifact-url != ''
        run: |
          {
            echo ""
            echo "📥 [Download \`ui-screenshots-${{ inputs.version }}.zip\`](${{ steps.shots.outputs.artifact-url }})"
          } >> "$GITHUB_STEP_SUMMARY"
