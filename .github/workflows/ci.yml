name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache pip dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('**/pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-pip-${{ matrix.python-version }}-
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"

    - name: Configure git for tests
      run: |
        git config --global user.email "test@example.com"
        git config --global user.name "Test User"

    - name: Run tests with pytest
      env:
        PYTHONWARNINGS: ignore
      run: |
        pytest tests/ -v --cov=memoir --cov-report=xml --cov-report=term-missing --ignore=tests/test_ui_e2e.py

    - name: Upload coverage to Codecov
      if: matrix.python-version == '3.11'
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Cache pip dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-lint-${{ hashFiles('**/pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-lint-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"

    - name: Check version consistency across package + plugin manifests
      run: |
        python scripts/check_version_consistency.py

    - name: Run Ruff (linting)
      run: |
        ruff check src/ tests/ benchmarks/ --exclude tests/test_ui_e2e.py

    - name: Run isort (import sorting)
      run: |
        isort --check-only --diff src/ tests/ benchmarks/ --skip tests/test_ui_e2e.py

    - name: Run Bandit (security)
      run: |
        bandit -r src/ --skip B101,B110,B404,B601,B603,B607,B608

  mcp:
    name: MCP server + packaging
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Set up Node
      uses: actions/setup-node@v4
      with:
        node-version: "20"

    - name: Install dependencies (with the mcp extra)
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev,mcp]"

    - name: Configure git for tests
      run: |
        git config --global user.email "test@example.com"
        git config --global user.name "Test User"

    - name: Validate .mcpb manifest
      run: npx -y @anthropic-ai/mcpb@latest validate packaging/mcp/manifest.json

    - name: Validate server.json (parseable JSON)
      run: python -c "import json; json.load(open('packaging/mcp/server.json'))"

    - name: Run MCP server tests
      env:
        PYTHONWARNINGS: ignore
      run: pytest tests/test_mcp_server.py -v

  codex-plugin:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Cache pip dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-codex-plugin-${{ hashFiles('**/pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-codex-plugin-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"

    - name: Configure git for tests
      run: |
        git config --global user.email "test@example.com"
        git config --global user.name "Test User"

    - name: Run Codex plugin tests
      env:
        PYTHONWARNINGS: ignore
      run: |
        make codex-plugin-test

    - name: Upload prompt harness artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: codex-plugin-prompt-harness
        path: /tmp/memoir-prompt-tests
        if-no-files-found: ignore
        retention-days: 30
